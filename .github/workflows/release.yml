name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild \
            -project AutoFrameCam.xcodeproj \
            -scheme "Reframe" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build Release
        run: |
          xcodebuild \
            -project AutoFrameCam.xcodeproj \
            -scheme "Reframe" \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          cd "build/Build/Products/Release"
          ditto -c -k --keepParent "Reframe.app" Reframe.zip

      - name: Build CLI
        run: |
          xcodebuild \
            -project AutoFrameCam.xcodeproj \
            -scheme autoframe-cam \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build-cli \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package CLI
        run: |
          mkdir -p staging
          cp "build-cli/Build/Products/Release/autoframe-cam" staging/reframe
          cd staging && tar czf ../reframe-cli.tar.gz reframe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              build/Build/Products/Release/Reframe.zip \
              reframe-cli.tar.gz \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              build/Build/Products/Release/Reframe.zip \
              reframe-cli.tar.gz \
              --generate-notes
          fi
