name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project AutoFrameCam.xcodeproj \
            -scheme "AutoFrame Cam" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project AutoFrameCam.xcodeproj \
            -scheme "AutoFrame Cam" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            test

  build-cli:
    name: Build CLI
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build CLI
        run: |
          xcodebuild \
            -project AutoFrameCam.xcodeproj \
            -scheme autoframe-cam \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build
