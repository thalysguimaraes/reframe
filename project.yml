name: Reframe
options:
  bundleIdPrefix: dev.autoframe
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 10
    MARKETING_VERSION: 0.1.0
    VERSIONING_SYSTEM: apple-generic
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: 13.0
    DEVELOPMENT_TEAM: B27B4ED4CL
    CODE_SIGN_STYLE: Automatic
    AUTOFRAME_APP_GROUP_ID: group.dev.autoframe.cam
targets:
  AutoFrameCore:
    type: framework.static
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.autoframe.AutoFrameCore
        PRODUCT_NAME: AutoFrameCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreImage.framework
      - sdk: CoreMedia.framework
      - sdk: CoreVideo.framework
      - sdk: CoreGraphics.framework
      - sdk: IOSurface.framework

  ReframeCameraExtension:
    type: system-extension
    platform: macOS
    deploymentTarget: "13.0"
    productName: ReframeCameraExtension
    sources:
      - path: Sources/CameraExtension
    attributes:
      SystemCapabilities:
        com.apple.developer.app-groups:
          enabled: 1
    info:
      path: Config/ReframeCameraExtension-Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSSystemExtensionUsageDescription: Reframe installs a virtual camera extension so meeting apps can use the reframed feed.
        ReframeAppGroupID: $(AUTOFRAME_APP_GROUP_ID)
        CMIOExtension:
          CMIOExtensionMachServiceName: $(AUTOFRAME_APP_GROUP_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.autoframe.AutoFrameCam.CameraExtension
        PRODUCT_NAME: ReframeCameraExtension
        EXECUTABLE_NAME: $(PRODUCT_BUNDLE_IDENTIFIER)
        WRAPPER_NAME: $(PRODUCT_BUNDLE_IDENTIFIER).systemextension
        CODE_SIGN_ENTITLEMENTS: Config/ReframeCameraExtension.entitlements
        ENABLE_APP_SANDBOX: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AutoFrameCore
      - sdk: CoreMediaIO.framework
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreImage.framework
      - sdk: CoreVideo.framework
      - sdk: IOSurface.framework
      - sdk: IOKit.framework

  ReframeApp:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    productName: Reframe
    sources:
      - path: Sources/App
      - path: Assets/Assets.xcassets
      - path: Assets/topbar-icon@2x.png
        type: file
        buildPhase: resources
      - path: Assets/AppIcon.icon
    attributes:
      SystemCapabilities:
        com.apple.developer.app-groups:
          enabled: 1
        com.apple.developer.system-extension.install:
          enabled: 1
    info:
      path: Config/Reframe-Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ReframeAppGroupID: $(AUTOFRAME_APP_GROUP_ID)
        NSCameraUsageDescription: Reframe needs camera access to preview and configure your selected webcam.
        NSSystemExtensionUsageDescription: Reframe installs a virtual camera extension so meeting apps can use the reframed feed.
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.autoframe.AutoFrameCam
        PRODUCT_NAME: Reframe
        CODE_SIGN_ENTITLEMENTS: Config/Reframe.entitlements
        ENABLE_APP_SANDBOX: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: AutoFrameCore
      - target: ReframeCameraExtension
        embed: true
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
      - sdk: AVFoundation.framework
      - sdk: IOSurface.framework
      - sdk: SystemExtensions.framework

  ReframeCLI:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    productName: reframe
    sources:
      - path: Sources/CLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.autoframe.ReframeCLI
        PRODUCT_NAME: reframe
    dependencies:
      - target: AutoFrameCore
      - sdk: AVFoundation.framework

  AutoFrameCoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/AutoFrameCoreTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AutoFrameCore

schemes:
  Reframe:
    build:
      targets:
        ReframeApp: all
        ReframeCameraExtension: all
        AutoFrameCore: all
    test:
      targets:
        - AutoFrameCoreTests
    run:
      config: Debug
  "Reframe CLI":
    build:
      targets:
        ReframeCLI: all
        AutoFrameCore: all
    test:
      targets:
        - AutoFrameCoreTests
    run:
      config: Debug
